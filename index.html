<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cuenta Regresiva ✨</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ffd6e7,#ffeef5,#fff5f9);
      overflow:hidden;
      font-family:'Poppins',sans-serif;
      position:relative;
    }

    /* Lucecitas */
    body::before,
    body::after{
      content:"";
      position:absolute;
      width:500px;
      height:500px;
      border-radius:50%;
      background:rgba(255,255,255,0.25);
      filter:blur(80px);
      z-index:0;
    }

    body::before{
      top:-150px;
      left:-100px;
    }

    body::after{
      bottom:-150px;
      right:-100px;
    }

    .container{
      position:relative;
      z-index:2;
      width:90%;
      max-width:1000px;
      padding:40px;
      border-radius:35px;
      background:rgba(255,255,255,0.35);
      backdrop-filter:blur(14px);
      box-shadow:0 15px 40px rgba(0,0,0,0.12);
      text-align:center;
    }

    .top-text{
      color:#8f4c6b;
      font-size:1.2rem;
      letter-spacing:4px;
      margin-bottom:10px;
    }

    h1{
      font-family:'Great Vibes',cursive;
      font-size:5rem;
      color:#ff4f8b;
      margin-bottom:15px;
    }

    .subtitle{
      font-size:1.1rem;
      color:#6d5561;
      margin-bottom:40px;
    }

    .countdown{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
      margin-bottom:40px;
    }

    .box{
      width:180px;
      padding:25px 20px;
      border-radius:25px;
      background:white;
      box-shadow:0 8px 25px rgba(255,79,139,0.15);
      transition:0.3s;
    }

    .box:hover{
      transform:translateY(-8px) scale(1.03);
    }

    .number{
      font-size:4rem;
      font-weight:700;
      color:#ff4f8b;
    }

    .label{
      font-size:1rem;
      color:#777;
      margin-top:5px;
      letter-spacing:2px;
    }

    .message{
      margin-top:20px;
      font-size:1.3rem;
      color:#7d5a6c;
      line-height:1.8;
    }

    .message span{
      color:#ff4f8b;
      font-weight:700;
    }

    .decor{
      font-size:2rem;
      margin-bottom:15px;
      animation:float 3s ease-in-out infinite;
    }

    @keyframes float{
      0%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-10px);
      }
      100%{
        transform:translateY(0px);
      }
    }

    /* Corazones flotando */

    .heart{
      position:absolute;
      color:#ff8bb2;
      animation:hearts 8s linear infinite;
      opacity:0.6;
      z-index:1;
    }

    @keyframes hearts{
      0%{
        transform:translateY(100vh) scale(0);
      }
      100%{
        transform:translateY(-120vh) scale(1.5);
      }
    }

    .heart:nth-child(1){
      left:10%;
      font-size:25px;
      animation-duration:7s;
    }

    .heart:nth-child(2){
      left:30%;
      font-size:35px;
      animation-duration:9s;
    }

    .heart:nth-child(3){
      left:50%;
      font-size:20px;
      animation-duration:6s;
    }

    .heart:nth-child(4){
      left:70%;
      font-size:30px;
      animation-duration:10s;
    }

    .heart:nth-child(5){
      left:90%;
      font-size:40px;
      animation-duration:8s;
    }

    @media(max-width:768px){

      h1{
        font-size:3.5rem;
      }

      .box{
        width:140px;
      }

      .number{
        font-size:3rem;
      }

    }

  </style>
</head>
<body>

  <!-- Corazones -->
  <div class="heart">💖</div>
  <div class="heart">✨</div>
  <div class="heart">💗</div>
  <div class="heart">🎀</div>
  <div class="heart">💕</div>

  <div class="container">

    <div class="decor">🎂 ✨ 👑 💖</div>

    <p class="top-text">CUENTA REGRESIVA</p>

    <h1>18 Años</h1>

    <p class="subtitle">
      Falta muy poquito para un día súper especial 💕
    </p>

    <div class="countdown">

      <div class="box">
        <div class="number" id="days">00</div>
        <div class="label">DÍAS</div>
      </div>

      <div class="box">
        <div class="number" id="hours">00</div>
        <div class="label">HORAS</div>
      </div>

      <div class="box">
        <div class="number" id="minutes">00</div>
        <div class="label">MINUTOS</div>
      </div>

      <div class="box">
        <div class="number" id="seconds">00</div>
        <div class="label">SEGUNDOS</div>
      </div>

    </div>

    <div class="message">
      🌸 El <span>29 de Mayo</span> ya esta cerca pronto cumplimpliras 18 años y sere feliz de estar contigo en este dia especial 💫
    </div>

  </div>

  <script>

    // Fecha objetivo
    const birthday = new Date("May 29, 2026 00:00:00").getTime();

    const countdown = setInterval(() => {

      const now = new Date().getTime();

      const distance = birthday - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));

      const hours = Math.floor(
        (distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)
      );

      const minutes = Math.floor(
        (distance % (1000 * 60 * 60)) / (1000 * 60)
      );

      const seconds = Math.floor(
        (distance % (1000 * 60)) / 1000
      );

      document.getElementById("days").innerHTML = days;
      document.getElementById("hours").innerHTML = hours;
      document.getElementById("minutes").innerHTML = minutes;
      document.getElementById("seconds").innerHTML = seconds;

      // Cuando llegue el día
      if(distance < 0){

        clearInterval(countdown);

        document.querySelector(".countdown").innerHTML = `
          <h2 style="
            color:#ff4f8b;
            font-size:3rem;
            width:100%;
          ">
            🎉 ¡FELICES 18! 🎂💖
          </h2>
        `;

      }

    },1000);

  </script>

</body>
</html>
