<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Cuenta Regresiva ✨</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="/style.css">

</head>
<body>

  <!-- Corazones flotando -->
  <div class="heart">💖</div>
  <div class="heart">✨</div>
  <div class="heart">💗</div>
  <div class="heart">🎀</div>
  <div class="heart">💕</div>

  <!-- CONTENIDO -->
  <main class="container">

    <!-- Decoración -->
    <div class="decor">
      🎂 ✨ 👑 💖
    </div>

    <!-- Texto superior -->
    <p class="top-text">
      CUENTA REGRESIVA
    </p>

    <!-- Título -->
    <h1>
      18 Años
    </h1>

    <!-- Subtítulo -->
    <p class="subtitle">
      Falta muy poquito para un día súper especial 💕
    </p>

    <!-- TEMPORIZADOR -->
    <section class="countdown">

      <!-- Días -->
      <article class="box">
        <div class="number" id="days">00</div>
        <div class="label">DÍAS</div>
      </article>

      <!-- Horas -->
      <article class="box">
        <div class="number" id="hours">00</div>
        <div class="label">HORAS</div>
      </article>

      <!-- Minutos -->
      <article class="box">
        <div class="number" id="minutes">00</div>
        <div class="label">MINUTOS</div>
      </article>

      <!-- Segundos -->
      <article class="box">
        <div class="number" id="seconds">00</div>
        <div class="label">SEGUNDOS</div>
      </article>

    </section>

    <!-- Mensaje -->
    <div class="message">

      🌸 El <span>29 de Mayo</span> llega una nueva etapa llena de sueños,
      aventuras y momentos inolvidables 💫

    </div>

  </main>

  <!-- JAVASCRIPT -->
  <script>

    // Fecha objetivo
    const birthday = new Date("May 29, 2026 00:00:00").getTime();

    // Actualizar cada segundo
    const countdown = setInterval(() => {

      const now = new Date().getTime();

      const distance = birthday - now;

      // Cálculos
      const days = Math.floor(
        distance / (1000 * 60 * 60 * 24)
      );

      const hours = Math.floor(
        (distance % (1000 * 60 * 60 * 24))
        / (1000 * 60 * 60)
      );

      const minutes = Math.floor(
        (distance % (1000 * 60 * 60))
        / (1000 * 60)
      );

      const seconds = Math.floor(
        (distance % (1000 * 60))
        / 1000
      );

      // Mostrar valores
      document.getElementById("days").innerHTML = days;
      document.getElementById("hours").innerHTML = hours;
      document.getElementById("minutes").innerHTML = minutes;
      document.getElementById("seconds").innerHTML = seconds;

      // Cuando llegue la fecha
      if(distance < 0){

        clearInterval(countdown);

        document.querySelector(".countdown").innerHTML = `

          <div style="
            width:100%;
            text-align:center;
          ">

            <h2 style="
              color:#ff4f8b;
              font-size:3rem;
              margin-bottom:20px;
            ">
              🎉 ¡FELICES 18! 🎂💖
            </h2>

            <p style="
              color:#7d5a6c;
              font-size:1.2rem;
            ">
              Hoy comienza una nueva aventura ✨
            </p>

          </div>

        `;

      }

    },1000);

  </script>

</body>
</html>
